# =============================================================================
# Nexus Agent — Production docker-compose
#
# Runs the full stack: nexus-agent, PostgreSQL+pgvector, Redis.
# Optional services (commented out): litellm-proxy, otel-collector, prometheus.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# For local development, docker-compose.override.yml adds hot-reload + src mount.
# =============================================================================

services:
  nexus-console:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://nexus-agent:8000
      VITE_WS_URL: ws://nexus-agent:8000/ws
    networks:
      - nexus-network
    depends_on:
      - nexus-agent
    restart: unless-stopped

  nexus-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      NEXUS_ENV: production
      NEXUS_FRONTEND__API_URL: http://localhost:8000
      NEXUS_EMBED__ENABLED: "true"
      NEXUS_EMBED__ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-network
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network
    restart: unless-stopped

  # ── Optional: LiteLLM Proxy ──────────────────────────────────────────────
  # litellm-proxy:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   ports:
  #     - "4000:4000"
  #   env_file:
  #     - ../.env
  #   networks:
  #     - nexus-network
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command:
  #     ["--port", "4000", "--config", "/app/config.yaml"]

  # ── Optional: OpenTelemetry Collector ─────────────────────────────────────
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   ports:
  #     - "4318:4318"
  #     - "4317:4317"
  #   volumes:
  #     - ./otel-collector.yaml:/etc/otel/config.yaml
  #   networks:
  #     - nexus-network

  # ── Optional: Prometheus ──────────────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - prometheus-data:/prometheus
  #     - ./prometheus.yaml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - nexus-network

volumes:
  postgres-data:
  redis-data:
  # prometheus-data:

networks:
  nexus-network:
    driver: bridge
