apiVersion: batch/v1
kind: Job
metadata:
  name: nexus-migration
  labels:
    app: nexus-agent
    component: migration
spec:
  template:
    metadata:
      labels:
        app: nexus-agent
        component: migration
    spec:
      restartPolicy: Never
      backoffLimit: 3
      containers:
        - name: migration
          image: nexus-agent:latest
          command: ["sh", "-c", "alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
