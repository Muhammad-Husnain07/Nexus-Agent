apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-agent
  labels:
    app: nexus-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-agent
  template:
    metadata:
      labels:
        app: nexus-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nexus-agent
          image: nexus-agent:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
