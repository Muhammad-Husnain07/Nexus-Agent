apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
type: Opaque
stringData:
  NEXUS_DATABASE__URL: "postgresql+asyncpg://nexus:CHANGE_ME@postgres:5432/nexus"
  NEXUS_REDIS__URL: "redis://redis:6379/0"
  NEXUS_AUTH__JWT_SECRET: "CHANGE_ME_TO_A_STRONG_RANDOM_SECRET"
  NEXUS_AUTH__CREDENTIAL_MASTER_KEY_REF: "env:NEXUS_CREDENTIAL_MASTER_KEY"
  NEXUS_CREDENTIAL_MASTER_KEY: "CHANGE_ME_TO_A_32_BYTE_SECRET"
  # NEXUS_OBSERVABILITY__LANGSMITH_API_KEY: "lsv2_..."
  # NEXUS_OBSERVABILITY__OTEL_ENDPOINT: "http://otel-collector:4318"
